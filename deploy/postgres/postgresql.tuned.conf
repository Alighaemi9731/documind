# Reference low-RAM tuning for a 2 GB VPS (kept in sync with the `command:`
# overrides in docker-compose.yml — that is the values actually applied).
# Apply via -c flags (compose) or mount as config_file in larger deployments.

listen_addresses = '*'
max_connections = 20
shared_buffers = 256MB
effective_cache_size = 512MB
work_mem = 8MB
maintenance_work_mem = 64MB          # bounds the HNSW index build spike
jit = off
max_parallel_workers_per_gather = 0
huge_pages = off
wal_compression = on
