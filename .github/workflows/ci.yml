name: ci

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: api (lint + test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: documind
          POSTGRES_PASSWORD: documind
          POSTGRES_DB: documind
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U documind"
          --health-interval 10s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://documind:documind@localhost:5432/documind
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy app
      - run: pytest -q

  web:
    name: web (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run build

  compose:
    name: compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Synthesize a throwaway .env
        run: |
          cp .env.example .env
          sed -i 's/^POSTGRES_PASSWORD=.*/POSTGRES_PASSWORD=ci-only/' .env
          sed -i 's/^JWT_SECRET=.*/JWT_SECRET=ci-only-not-a-real-secret-000000000000/' .env
      - run: docker compose --env-file .env -f deploy/docker-compose.yml config -q
